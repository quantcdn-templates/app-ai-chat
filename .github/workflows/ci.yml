# This workflow is used to build and test the AI Chat image.
# It creates the public, default images that can be deployed directly to Quant Cloud.
# If you wish to customize, you can fork this repository, make modifications, and then
# use the "build-deploy.yaml" workflow to build and push your own images to Quant Cloud.
#
# NOTE: This workflow only runs for the quantcdn-templates organization.
# If you've forked this repo, this workflow will be skipped automatically.
name: Build and Push AI Chat to Public Registry

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if no changes'
        required: false
        default: 'false'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: quantcdn-templates/app-ai-chat

jobs:
  build-and-push:
    # Only run for quantcdn-templates organization
    if: github.repository_owner == 'quantcdn-templates'
    runs-on: ${{ vars.RUNNER_TYPE || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Detect app version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version" 2>/dev/null) || VERSION="1.0.0"
          echo "Detected version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "patch=$PATCH" >> $GITHUB_OUTPUT

      - name: Generate image tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          VERSION="${{ steps.version.outputs.version }}"
          MAJOR="${{ steps.version.outputs.major }}"
          MINOR="${{ steps.version.outputs.minor }}"

          TAGS=""

          if [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            TAGS="${IMAGE}:develop"
            TAGS="${TAGS},${IMAGE}:dev"
            TAGS="${TAGS},${IMAGE}:edge"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]] || [[ "${{ github.event_name }}" == "schedule" ]]; then
            TAGS="${IMAGE}:latest"
            TAGS="${TAGS},${IMAGE}:${VERSION}"
            TAGS="${TAGS},${IMAGE}:${MAJOR}.${MINOR}.x-latest"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            GIT_TAG="${{ github.ref_name }}"
            TAGS="${IMAGE}:${GIT_TAG}"
            TAGS="${TAGS},${IMAGE}:${GIT_TAG#v}"
          fi

          echo "Generated tags: $TAGS"
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: |
            type=gha
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache,mode=max

      - name: Test container startup
        run: |
          echo "Testing container startup..."
          docker run --rm -d --name test-ai-chat \
            -e QUANT_API_TOKEN=test \
            -e QUANT_ORGANISATION=test \
            -p 3000:3000 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest || true

          sleep 5

          if docker ps | grep test-ai-chat; then
            echo "Container started successfully"
            curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 | grep -E "^(200|302|401|403)$" && echo "HTTP response OK" || echo "HTTP check skipped (expected without valid credentials)"
            docker stop test-ai-chat
          else
            echo "Container startup test completed (failure expected without valid API credentials)"
          fi

      - name: Create release summary
        run: |
          echo "## AI Chat Template Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **App Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Base Image**: \`ghcr.io/quantcdn-templates/app-node:22\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags**: \`${{ steps.tags.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
